<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>500 — Server Error</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root { --bg: #0d1117; --card: #1a2035; --gold: #c9a84c; --text: #e8eaf6; --muted: #4a5568; --sub: #a0aec0; --red: #fc8181; }
  body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text);
         min-height: 100vh; display: flex; align-items: center; justify-content: center; }
  .box { text-align: center; padding: 60px 40px; }
  .code { font-size: 100px; font-weight: 900; color: var(--red); line-height: 1; }
  h1 { font-size: 24px; margin: 16px 0 8px; }
  p  { color: var(--sub); font-size: 15px; margin-bottom: 32px; }
  a  { display: inline-block; background: var(--gold); color: var(--bg);
       padding: 12px 28px; border-radius: 8px; text-decoration: none;
       font-weight: 700; font-size: 15px; }
  a:hover { opacity: .85; }
</style>
</head>
<body>
  <div class="box">
    <div class="code">500</div>
    <h1>Something Went Wrong</h1>
    <p>An internal server error occurred. Please try again later.</p>
    <a href="/">← Go to Dashboard</a>
  </div>
</body>
</html>
