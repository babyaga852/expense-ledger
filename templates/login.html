<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Expense Ledger – Sign In</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Segoe UI', sans-serif;
    background: #0d1117;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .card {
    background: #1a2035;
    border-radius: 16px;
    padding: 40px 36px;
    width: 100%;
    max-width: 420px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.5);
  }
  .logo {
    text-align: center;
    margin-bottom: 28px;
  }
  .logo .symbol {
    font-size: 40px;
    color: #c9a84c;
    font-weight: 900;
    line-height: 1;
  }
  .logo h1 {
    color: #e8eaf6;
    font-size: 20px;
    font-weight: 700;
    margin-top: 6px;
    letter-spacing: 1px;
  }
  .logo p { color: #4a5568; font-size: 13px; margin-top: 4px; }
  .tabs {
    display: flex;
    background: #0d1117;
    border-radius: 8px;
    padding: 4px;
    margin-bottom: 24px;
  }
  .tabs a {
    flex: 1;
    text-align: center;
    padding: 8px;
    border-radius: 6px;
    text-decoration: none;
    font-size: 14px;
    font-weight: 600;
    color: #4a5568;
    transition: all .2s;
  }
  .tabs a.active {
    background: #1a2035;
    color: #c9a84c;
  }
  label { display: block; color: #a0aec0; font-size: 13px; margin-bottom: 6px; }
  input[type=text], input[type=password], input[type=email] {
    width: 100%;
    background: #0d1117;
    border: 1px solid #2d3748;
    border-radius: 8px;
    padding: 11px 14px;
    color: #e8eaf6;
    font-size: 14px;
    margin-bottom: 16px;
    outline: none;
    transition: border-color .2s;
  }
  input:focus { border-color: #c9a84c; }
  .btn {
    width: 100%;
    background: #c9a84c;
    color: #0d1117;
    border: none;
    border-radius: 8px;
    padding: 13px;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    transition: opacity .2s;
    margin-top: 4px;
  }
  .btn:hover { opacity: .88; }
  .alert {
    padding: 11px 14px;
    border-radius: 8px;
    font-size: 13px;
    margin-bottom: 18px;
  }
  .alert-error { background: #2d1515; color: #fc8181; border: 1px solid #c53030; }
  .alert-success { background: #1a2d1a; color: #68d391; border: 1px solid #276749; }
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <div class="symbol">₹</div>
    <h1>EXPENSE LEDGER</h1>
    <p>Track every rupee</p>
  </div>

  <div class="tabs">
    <a href="/login" class="active">Sign In</a>
    <a href="/register" class="">Register</a>
  </div>

  
  

  
  <form method="POST" action="/login">
    <label>Username</label>
    <input type="text" name="username" placeholder="Enter username" required autofocus>
    <label>Password</label>
    <input type="password" name="password" placeholder="Enter password" required>
    <button class="btn" type="submit">Sign In</button>
  </form>
  
</div>
</body>
</html>
